<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ครอบตัดรูปภาพฟรี - thaiimg.com</title>
<link rel="stylesheet" href="thai.css?v=2">

</head>
<body>

<!-- ── Topbar (logo + ads) ────────────────────────── -->
<header class="topbar">
  <a href="/" class="brand">
    <img src="icons/logo.png" alt="thaiimg" class="brand-logo">
  </a>
  <div class="ads-slot ads-topbar">
    <span>พื้นที่โฆษณา (Google Ads)</span>
  </div>
</header>

<!-- ── Sidebar ────────────────────────────────────── -->
<aside class="sidebar">

  <div>
    <p class="sidebar-section-label">เครื่องมือ</p>
    <nav class="tools-nav">
      <a href="/compress" class="tool-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        <span>บีบอัดรูปภาพ</span>
      </a>
      <a href="/resize" class="tool-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        <span>ปรับขนาดรูปภาพ</span>
      </a>
      <a href="/convert" class="tool-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span>แปลงเป็น JPG</span>
      </a>
      <a href="/crop" class="tool-link active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2v14a2 2 0 0 0 2 2h14"/><path d="M18 22V8a2 2 0 0 0-2-2H2"/></svg>
        <span>ครอบตัดรูปภาพ</span>
      </a>
      <a href="/edit" class="tool-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3L13.5 8L19 9L13.5 10.5L12 16L10.5 10.5L5 9L10.5 8L12 3z"/><path d="M19 17l.7 2 2 .7-2 .7-.7 2-.7-2-2-.7 2-.7L19 17z"/></svg>
        <span>ปรับแต่งภาพถ่าย</span>
      </a>
    </nav>
  </div>

  <p class="sidebar-footer">© thaiimg.com</p>

</aside>

<!-- ── Workspace ──────────────────────────────────── -->
<main class="workspace">

  <header class="page-header">
    <h1>ครอบตัดรูปภาพ</h1>
    <p>
      ครอบตัด <b>JPG</b>, <b>PNG</b>, <b>WEBP</b><br>
      ลากครอบส่วนที่ต้องการ หรือกรอกขนาดเอง
    </p>
  </header>

  <!-- Drop zone -->
  <div id="drop-zone">
    <div class="drop-icon">
      <svg width="56" height="56" viewBox="0 0 52 52" fill="none">
        <circle cx="26" cy="26" r="26" fill="#FBEDD9"/>
        <path d="M10 40 L18 26 L25 34 L31 26 L42 40 Z" fill="#F08641"/>
        <circle cx="34" cy="18" r="4" fill="#D4A437"/>
        <path d="M20 18 L20 12" stroke="#E97132" stroke-width="2" stroke-linecap="round"/>
        <path d="M17 15 L20 12 L23 15" stroke="#E97132" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <label id="selectBtn" for="fileInput">เลือกรูปภาพ</label>
    <input type="file" id="fileInput"
      accept=".jpg,.jpeg,.png,.webp" hidden>
    <p class="drop-hint">หรือลากและวางรูปภาพที่นี่</p>
    <p class="format-hint">JPG &nbsp;·&nbsp; PNG &nbsp;·&nbsp; WEBP</p>
  </div>

  <!-- File section -->
  <div id="file-section" hidden>

    <div class="crop-stage">
      <div class="crop-image-wrap" id="cropWrap">
        <img id="cropImg" alt="" draggable="false">
        <div id="cropBox" hidden>
          <div class="crop-handle" data-h="nw"></div>
          <div class="crop-handle" data-h="ne"></div>
          <div class="crop-handle" data-h="sw"></div>
          <div class="crop-handle" data-h="se"></div>
          <div class="crop-handle" data-h="n"></div>
          <div class="crop-handle" data-h="s"></div>
          <div class="crop-handle" data-h="w"></div>
          <div class="crop-handle" data-h="e"></div>
        </div>
      </div>
    </div>

    <div class="crop-controls">
      <h3>ตัวเลือกการครอบตัด</h3>
      <div class="crop-field">
        <label for="cropW">ความกว้าง (px)</label>
        <input type="number" id="cropW" min="1">
      </div>
      <div class="crop-field">
        <label for="cropH">ความสูง (px)</label>
        <input type="number" id="cropH" min="1">
      </div>
      <div class="crop-field">
        <label for="cropX">ตำแหน่ง X (px)</label>
        <input type="number" id="cropX" min="0">
      </div>
      <div class="crop-field">
        <label for="cropY">ตำแหน่ง Y (px)</label>
        <input type="number" id="cropY" min="0">
      </div>
    </div>

    <div class="action-bar">

      <p id="file-count" class="file-count"></p>

      <button id="convertBtn" class="convert-btn">
        ครอบตัดรูปภาพ
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="7.5" stroke="white" stroke-width="1.5"/>
          <path d="M6 9 L12 9 M9.5 6.5 L12 9 L9.5 11.5"
            stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

    </div>

  </div>

</main>

<script src="crop.js"></script>

</body>
</html>
