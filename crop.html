<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ครอบตัดรูปภาพฟรี - thaiimg.com</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- ── Header ─────────────────────────────────────── -->
<header class="site-header">

  <a href="/" class="logo">
    <svg width="34" height="34" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="36" height="36" rx="8" fill="url(#lg4)"/>
      <path d="M4 29 L11 17 L17.5 24 L23 17.5 L32 29 Z" fill="white" opacity="0.9"/>
      <circle cx="27" cy="10" r="3.5" fill="#FF5722"/>
      <rect x="28" y="26" width="4" height="4" rx="1" fill="white" opacity="0.35"/>
      <rect x="32" y="30" width="3" height="3" rx="1" fill="white" opacity="0.2"/>
      <defs>
        <linearGradient id="lg4" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
          <stop stop-color="#42A5F5"/>
          <stop offset="1" stop-color="#1565C0"/>
        </linearGradient>
      </defs>
    </svg>
    <span class="logo-word"><span class="lt">thai</span><span class="li">img</span></span>
  </a>

  <nav class="site-nav">
    <a href="/compress">บีบอัดรูปภาพ</a>
    <a href="/resize">ปรับขนาดรูปภาพ</a>
    <a href="/">แปลงเป็น JPG</a>
    <a href="/crop" class="nav-active">ครอบตัดรูปภาพ</a>
  </nav>

</header>

<!-- ── Main ───────────────────────────────────────── -->
<main class="page-wrap">

  <h1>ครอบตัดรูปภาพ</h1>
  <p class="subtitle">
    ครอบตัด <b>JPG</b>, <b>PNG</b>, <b>WEBP</b><br>
    ลากครอบส่วนที่ต้องการ หรือกรอกขนาดเอง
  </p>

  <!-- Drop zone -->
  <div id="drop-zone">
    <div class="drop-icon">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
        <circle cx="26" cy="26" r="26" fill="#EFF6FF"/>
        <path d="M10 40 L18 26 L25 34 L31 26 L42 40 Z" fill="#93C5FD"/>
        <circle cx="34" cy="18" r="4" fill="#FCA5A5"/>
        <path d="M20 18 L20 12" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
        <path d="M17 15 L20 12 L23 15" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <label id="selectBtn" for="fileInput">เลือกรูปภาพ</label>
    <input type="file" id="fileInput"
      accept=".jpg,.jpeg,.png,.webp" hidden>
    <p class="drop-hint">หรือลากและวางรูปภาพที่นี่</p>
    <p class="format-hint">JPG &nbsp;·&nbsp; PNG &nbsp;·&nbsp; WEBP</p>
  </div>

  <!-- File section -->
  <div id="file-section" hidden>

    <div class="crop-stage">
      <div class="crop-image-wrap" id="cropWrap">
        <img id="cropImg" alt="" draggable="false">
        <div id="cropBox" hidden>
          <div class="crop-handle" data-h="nw"></div>
          <div class="crop-handle" data-h="ne"></div>
          <div class="crop-handle" data-h="sw"></div>
          <div class="crop-handle" data-h="se"></div>
          <div class="crop-handle" data-h="n"></div>
          <div class="crop-handle" data-h="s"></div>
          <div class="crop-handle" data-h="w"></div>
          <div class="crop-handle" data-h="e"></div>
        </div>
      </div>
    </div>

    <div class="crop-controls">
      <h3>ตัวเลือกการครอบตัด</h3>
      <div class="crop-field">
        <label for="cropW">ความกว้าง (px)</label>
        <input type="number" id="cropW" min="1">
      </div>
      <div class="crop-field">
        <label for="cropH">ความสูง (px)</label>
        <input type="number" id="cropH" min="1">
      </div>
      <div class="crop-field">
        <label for="cropX">ตำแหน่ง X (px)</label>
        <input type="number" id="cropX" min="0">
      </div>
      <div class="crop-field">
        <label for="cropY">ตำแหน่ง Y (px)</label>
        <input type="number" id="cropY" min="0">
      </div>
    </div>

    <div class="action-bar">

      <p id="file-count" class="file-count"></p>

      <button id="convertBtn" class="convert-btn">
        ครอบตัดรูปภาพ
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="7.5" stroke="white" stroke-width="1.5"/>
          <path d="M6 9 L12 9 M9.5 6.5 L12 9 L9.5 11.5"
            stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

    </div>

  </div>

</main>

<script src="crop.js"></script>

</body>
</html>
