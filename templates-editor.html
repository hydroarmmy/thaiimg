<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.googletagmanager.com">
<link rel="preconnect" href="https://pagead2.googlesyndication.com">
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1191923210487951" crossorigin="anonymous"></script>
<!-- Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-24FR9E6CYV"></script>

window.dataLayer = window.dataLayer || [];

<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>แก้ไขเทมเพลต - thaiimg.com</title>
<!-- SEO -->
<meta name="description" content="แก้ไขเทมเพลตการ์ดออนไลน์ ใส่รูป + ข้อความ ปรับแต่งได้ทันที ทำงานในเบราว์เซอร์ ฟรี">
<meta name="robots" content="noindex, follow">

<!-- Extra Thai fonts for templates -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Prompt:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png?v=3">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/favicon-192.png?v=3">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/favicon-180.png?v=3">
<link rel="stylesheet" href="thai.css?v=18">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#E97132">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="thaiimg">

</head>
<body class="editor-body">

<header class="editor-topbar">
  <a href="/templates" class="editor-back">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
    </svg>
    <span>เทมเพลตทั้งหมด</span>
  </a>

  <h1 id="templateTitle" class="editor-title">กำลังโหลด...</h1>

  <button id="downloadBtn" class="editor-download-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    <span>บันทึก</span>
  </button>
</header>

<main class="editor-main">
  <div class="editor-canvas-wrap">
    <canvas id="editorCanvas"></canvas>
    <p class="editor-hint">💡 แตะกรอบเพื่อใส่รูป · แตะรูปอีกครั้งเพื่อ <b>เปลี่ยนกรอบ</b> (สี่เหลี่ยม/วงกลม) + ปรับตำแหน่ง · แตะข้อความเพื่อแก้ไข</p>
  </div>
</main>

<input type="file" id="fileInput" accept="image/*" hidden>

<!-- Photo slot edit overlay -->
<div id="editorOverlay" class="editor-overlay">
  <canvas id="overlayCanvas"></canvas>
</div>

<div id="editPanel" class="editor-edit-panel">
  <div class="edit-panel-title">ปรับตำแหน่งรูปในกรอบ</div>

  <div class="edit-panel-shape-row">
    <span class="edit-panel-label">รูปทรง:</span>
    <button class="shape-btn" data-shape="rect" type="button" aria-label="สี่เหลี่ยม">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16"/></svg>
    </button>
    <button class="shape-btn" data-shape="rounded" type="button" aria-label="มุมโค้ง">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="4"/></svg>
    </button>
    <button class="shape-btn" data-shape="circle" type="button" aria-label="วงกลม">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/></svg>
    </button>
  </div>

  <div class="edit-panel-shape-row">
    <span class="edit-panel-label">อัตราส่วน:</span>
    <button class="shape-btn shape-btn-text" data-shape="ratio-4-5"  type="button" aria-label="4:5 (Instagram portrait)">4:5</button>
    <button class="shape-btn shape-btn-text" data-shape="ratio-16-9" type="button" aria-label="16:9 (แนวนอน)">16:9</button>
    <button class="shape-btn shape-btn-text" data-shape="ratio-3-4"  type="button" aria-label="3:4 (รูปคลาสสิก)">3:4</button>
    <button class="shape-btn shape-btn-text" data-shape="ratio-9-16" type="button" aria-label="9:16 (Story/Reels)">9:16</button>
  </div>

  <div class="edit-panel-help">ลาก = เลื่อน · ปุ่ม +/- หรือ scroll = ขยาย/ย่อ</div>

  <div class="edit-panel-controls">
    <button id="editZoomOut" class="edit-btn" type="button">−</button>
    <button id="editReset" class="edit-btn edit-btn-text" type="button">รีเซ็ต</button>
    <button id="editZoomIn" class="edit-btn" type="button">+</button>
    <button id="resetSlotBtn" class="edit-btn edit-btn-danger" type="button">ลบรูป</button>
    <button id="editDoneBtn" class="edit-btn edit-btn-primary" type="button">เสร็จสิ้น ✓</button>
  </div>
</div>

<!-- Text edit panel -->
<div id="textPanel" class="editor-text-panel">
  <div class="text-panel-title">แก้ไขข้อความ</div>
  <textarea id="textTextarea" class="text-panel-textarea" rows="3"></textarea>
  <div class="text-panel-controls">
    <button id="textCancelBtn" class="edit-btn" type="button">ยกเลิก</button>
    <button id="textSaveBtn" class="edit-btn edit-btn-primary" type="button">บันทึก ✓</button>
  </div>
</div>

<script src="templates-data.js?v=2"></script>
<script src="templates-editor.js?v=5"></script>
<script src="analytics.js?v=1" defer></script>
<script src="pwa.js?v=2" defer></script>
</body>
</html>
